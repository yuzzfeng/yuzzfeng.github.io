7b49\u591a\u57301\u5c0f\u65f6\u964d\u96e8\u91cf\u8d85\u8fc7100\u6beb\u7c73\uff0c\u5176\u4e2d\u90d1\u5dde\u6c14\u8c61\u89c2\u6d4b\u7ad9\u6700\u5927\u5c0f\u65f6\u964d\u96e8\u91cf\u8fbe201.9\u6beb\u7c73\uff0820\u65e516\u65f6-17\u65f6)\uff0c\u7a81\u7834\u4e2d\u56fd\u5927\u9646\u5c0f\u65f6\u964d\u96e8\u91cf\u5386\u53f2\u6781\u503c\uff08198.5\u6beb\u7c73\uff0c\u6cb3\u5357\u6797\u5e84\uff0c1975\u5e748\u67085\u65e5\uff09\u3002\u90d1\u5dde\u5c40\u57303\u5c0f\u65f6\u6700\u5927\u964d\u96e8\u91cf\u8fbe333\u6beb\u7c73\u3002\u964d\u96e8\u6781\u7aef\u6027\u7a81\u51fa\uff1a\u6b64\u6b21\u5f3a\u964d\u96e8\u8fc7\u7a0b\u4e2d\uff0c\u90d1\u5dde\u3001\u5d69\u5c71\u3001\u65b0\u5bc6\u7b4910\u4e2a\u56fd\u5bb6\u7ea7\u6c14\u8c61\u7ad9\u65e5\u964d\u6c34\u91cf\u7a81\u7834\u5efa\u7ad9\u4ee5\u6765\u5386\u53f2\u6781\u503c\u3002\u5176\u4e2d\uff0c\u90d1\u5dde\u5e02\u4e8c\u4e03\u533a\u5c16\u5c97\u6c14\u8c61\u7ad924\u5c0f\u65f6\u964d\u96e8\u91cf\u9ad8\u8fbe696.9\u6beb\u7c73\uff0c\u8d85\u8fc7\u90d1\u5dde\u5168\u5e74\u5e73\u5747\u964d\u6c34\u603b\u91cf\u3002\u201c\u5343\u5e74\u4e00\u9047\u201d\u7684\u8bf4\u6cd5\u79d1\u5b66\u5417\uff1f\u6709\u4eba\u79f0\u6b64\u6b21\u6cb3\u5357\u5f3a\u964d\u96e8\u201c\u4e09\u5929\u4e0b\u4e86\u4e00\u5e74\u7684\u91cf\u201d\uff0c\u662f\u201c\u5343\u5e74\u4e00\u9047\u201d\uff0c\u8fd9\u4e00\u8bf4\u6cd5\u79d1\u5b66\u5417\uff1f\u9648\u6d9b\u8bf4\uff0c\u201c\u5343\u5e74\u4e00\u9047\u201d\u201c\u767e\u5e74\u4e00\u9047\u201d\u6e90\u81ea\u6c34\u6587\u6c14\u8c61\u91cc\u7684\u4e00\u79cd\u89e3\u91ca\uff0c\u4ee5\u6781\u7aef\u6d2a\u6c34\u4e8b\u4ef6\u51fa\u73b0\u7684\u5386\u53f2\u91cd\u73b0\u671f\u4e3a\u5468\u671f\u6765\u6d4b\u7b97\u3002\u8fd9\u6b21\u66b4\u96e8\u6765\u88ad\uff0c\u5728\u6c14\u8c61\u4eba\u5458\u6ca1\u6709\u5f97\u5230\u53ef\u9760\u7684\u3001\u957f\u65f6\u6548\u7684\u8bb0\u5f55\u4e4b\u524d\uff0c\u5f88\u96be\u5f97\u51fa\u8fd9\u6837\u7684\u5224\u65ad\u3002\u9648\u6d9b\u8868\u793a\uff0c\u4ece\u5927\u6c14\u79d1\u5b66\u7814\u7a76\u7684\u89d2\u5ea6\u6765\u770b\uff0c\u6211\u56fd\u572820\u4e16\u7eaa50\u5e74\u4ee3\u4e4b\u540e\u624d\u6709\u4e86\u6bd4\u8f83\u51c6\u786e\u548c\u5b8c\u6574\u7684\u964d\u96e8\u91cf\u7684\u79d1\u5b66\u8bb0\u5f55\uff0c\u5230\u73b0\u5728\u4e3a\u6b62\uff0c\u6574\u4e2a\u964d\u96e8\u91cf\u8bb0\u5f55\u65f6\u95f4\u662f70\u5e74\u5de6\u53f3\u3002\u201c\u5343\u5e74\u4e00\u9047\u201d\u7684\u8bf4\u6cd5\u662f\u4f9d\u636e\u8f83\u957f\u7684\u5386\u53f2\u8bb0\u5f55\u6765\u63a8\u7b97\u67d0\u4e00\u7c7b\u5929\u6c14\u4e8b\u4ef6\uff0c\u6216\u8005\u901a\u8fc7\u767e\u5206\u6bd4\u7684\u7edf\u8ba1\u5b66\u65b9\u6cd5\uff0c\u6765\u8868\u73b0\u5929\u6c14\u7684\u6781\u7aef\u6027\uff0c\u8fd9\u4e9b\u90fd\u9700\u8981\u57fa\u4e8e\u4e25\u8c28\u7684\u6c14\u8c61\u8bb0\u5f55\u3002\u6cb3\u5357\u7701\u6c14\u8c61\u53f0\u526f\u53f0\u957f\u82cf\u7231\u82b3\u79f0\uff0c\u65b0\u4e2d\u56fd\u4ee5\u6765\uff0c\u6cb3\u5357\u66fe\u51fa\u73b0\u8fc75\u6b21\u5168\u7701\u6027\u7684\u5f3a\u964d\u96e8\u8fc7\u7a0b\uff0c\u5176\u4e2d\u6700\u8457\u540d\u7684\u5f53\u5c5e\u201c75\u00b78\u201d\u66b4\u96e8\u3002\u901a\u8fc7\u6bd4\u8f83\u53ef\u4ee5\u770b\u51fa\uff0c\u6b64\u6b21\u66b4\u96e8\u8fc7\u7a0b\u5168\u7701\u7d2f\u8ba1\u96e8\u91cf\u6700\u5927\u503c\u3001\u4e00\u5c0f\u65f6\u6700\u5927\u964d\u6c34\u91cf\u53ca\u65e5\u96e8\u91cf\u90fd\u7a81\u7834\u6781\u503c\uff0c\u5747\u5927\u4e8e\u4e0a\u8ff05\u6b21\u8fc7\u7a0b\uff1b\u65e5\u6700\u5927\u964d\u6c34\u91cf\u548c6\u5c0f\u65f6\u6700\u5927\u964d\u6c34\u91cf\u5219\u4ec5\u6b21\u4e8e\u201c75\u00b78\u201d\u8fc7\u7a0b\u3002\u201c\u6309\u7167\u6cb3\u5357\u7701\u5730\u65b9\u6807\u51c6\u66b4\u96e8\u8fc7\u7a0b\u6c14\u8c61\u5f3a\u5ea6\u8bc4\u4f30\u89c4\u8303\uff0c\u6211\u4eec\u7efc\u5408\u8003\u8651\u6301\u7eed\u5929\u6570\u3001\u8fc7\u7a0b\u8303\u56f4\u3001\u6700\u5927\u65e5\u964d\u6c34\u91cf\u7b49\u6307\u6807\uff0c\u6b64\u6b21\u66b4\u96e8\u8fc7\u7a0b\u5f3a\u5ea6\u8fbe\u5230\u2018\u7279\u5f3a\u2019\u7b49\u7ea7\u3002\u201d\u82cf\u7231\u82b3\u8bf4\u3002\u53f0\u98ce\u201c\u70df\u82b1\u201d\u5bfc\u81f4\u6cb3\u5357\u66b4\u96e8\uff1f\u4e0d\u5c11\u7f51\u53cb\u63d0\u51fa\u7591\u95ee\uff1a\u53f0\u98ce\u201c\u70df\u82b1\u201d\u5c1a\u672a\u767b\u9646\uff0c\u4e3a\u4f55\u4f1a\u5bf9\u5185\u9646\u6cb3\u5357\u4ea7\u751f\u66b4\u96e8\u5f71\u54cd\uff1f\u9648\u6d9b\u8bf4\uff0c\u201c\u70df\u82b1\u201d\u867d\u7136\u5c1a\u672a\u767b\u9646\u6211\u56fd\uff0c\u4f46\u201c\u70df\u82b1\u201d\u5317\u4fa7\u548c\u526f\u9ad8\u4e4b\u95f4\u4f1a\u5f62\u6210\u504f\u4e1c\u6c14\u6d41\uff0c\u5927\u91cf\u6c34\u6c14\u6301\u7eed\u5411\u9ec4\u6dee\u4e00\u5e26\u8f93\u9001\uff0c\u964d\u6c34\u7cfb\u7edf\u53cd\u590d\u5728\u6cb3\u5357\u5730\u533a\u505c\u6ede\uff0c\u9020\u6210\u6cb3\u5357\u5c40\u5730\u7279\u5927\u66b4\u96e8\u3002\u4ed6\u540c\u65f6\u8868\u793a\uff0c\u53f0\u98ce\u201c\u70df\u82b1\u201d\u53ea\u662f\u6b64\u6b21\u6cb3\u5357\u5f3a\u964d\u96e8\u7684\u6210\u56e0\u4e4b\u4e00\u3002\u5177\u4f53\u6765\u770b\uff0c\u5171\u6709\u56db\u5927\u56e0\u7d20\u5bfc\u81f4\u6b64\u6b21\u5f3a\u964d\u96e8\u2014\u2014\u5927\u6c14\u73af\u6d41\u5f62\u52bf\u7a33\u5b9a\u3002\u897f\u592a\u5e73\u6d0b\u526f\u70ed\u5e26\u9ad8\u538b\u548c\u5927\u9646\u9ad8\u538b\u5206\u522b\u7a33\u5b9a\u7ef4\u6301\u5728\u65e5\u672c\u6d77\u548c\u6211\u56fd\u897f\u5317\u5730\u533a\uff0c\u5bfc\u81f4\u4e24\u8005\u4e4b\u95f4\u7684\u4f4e\u503c\u5929\u6c14\u7cfb\u7edf\u5728\u9ec4\u6dee\u5730\u533a\u505c\u6ede\u5c11\u52a8\uff0c\u9020\u6210\u6cb3\u5357\u4e2d\u897f\u90e8\u957f\u65f6\u95f4\u51fa\u73b0\u964d\u6c34\u5929\u6c14\u3002\u6c34\u6c7d\u6761\u4ef6\u5145\u6c9b\u30027\u6708\u4e2d\u65ec\u6cb3\u5357\u5904\u4e8e\u526f\u9ad8\u8fb9\u7f18\uff0c\u5bf9\u6d41\u4e0d\u7a33\u5b9a\u80fd\u91cf\u5145\u8db3\uff0c18\u65e5\u897f\u592a\u5e73\u6d0b\u6709\u53f0\u98ce\u201c\u70df\u82b1\u201d\u751f\u6210\u5e76\u5411\u6211\u56fd\u9760\u8fd1\u3002\u53d7\u53f0\u98ce\u5916\u56f4\u548c\u526f\u9ad8\u5357\u4fa7\u7684\u504f\u4e1c\u6c14\u6d41\u5f15\u5bfc\uff0c\u5927\u91cf\u6c34\u6c7d\u5411\u6211\u56fd\u5185\u9646\u5730\u533a\u8f93\u9001\uff0c\u4e3a\u6cb3\u5357\u5f3a\u964d\u96e8\u63d0\u4f9b\u4e86\u5145\u6c9b\u7684\u6c34\u6c7d\u6765\u6e90\uff0c\u964d\u6c34\u6548\u7387\u9ad8\u3002\u5730\u5f62\u964d\u6c34\u6548\u5e94\u663e\u8457\u3002\u53d7\u6df1\u539a\u7684\u504f\u4e1c\u98ce\u6025\u6d41\u53ca\u4f4e\u6da1\u5207\u53d8\u5929\u6c14\u7cfb\u7edf\u5f71\u54cd\uff0c\u52a0\u4e4b\u6cb3\u5357\u7701\u592a\u884c\u5c71\u533a\u3001\u4f0f\u725b\u5c71\u533a\u7279\u6b8a\u5730\u5f62\u5bf9\u504f\u4e1c\u6c14\u6d41\u8d77\u5230\u62ac\u5347\u8f90\u5408\u6548\u5e94\uff0c\u5f3a\u964d\u6c34\u533a\u5728\u6cb3\u5357\u7701\u897f\u90e8\u3001\u897f\u5317\u90e8\u6cbf\u5c71\u5730\u533a\u7a33\u5b9a\u5c11\u52a8\uff0c\u5730\u5f62\u8fce\u98ce\u5761\u524d\u964d\u6c34\u589e\u5e45\u660e\u663e\u3002\u5bf9\u6d41\u201c\u5217\u8f66\u6548\u5e94\u201d\u660e\u663e\u3002\u5728\u7a33\u5b9a\u5929\u6c14\u5f62\u52bf\u4e0b\uff0c\u4e2d\u5c0f\u5c3a\u5ea6\u5bf9\u6d41\u53cd\u590d\u5728\u4f0f\u725b\u5c71\u524d\u5730\u533a\u53d1\u5c55\u5e76\u5411\u90d1\u5dde\u65b9\u5411\u79fb\u52a8\uff0c\u5f62\u6210\u201c\u5217\u8f66\u6548\u5e94\u201d\uff0c\u5bfc\u81f4\u964d\u6c34\u5f3a\u5ea6\u5927\u3001\u7ef4\u6301\u65f6\u95f4\u957f\uff0c\u5f15\u8d77\u5c40\u5730\u6781\u7aef\u5f3a\u964d\u6c34\u3002\u201c\u4ece\u76ee\u524d\u2018\u70df\u82b1\u2019\u8def\u5f84\u6765\u770b\uff0c\u9884\u8ba1\u5c06\u4e8e23\u65e5\u524d\u540e\u9010\u6b65\u767b\u9646\u6211\u56fd\u6d59\u95fd\u6cbf\u6d77\uff0c\u4ece25\u65e5\u523027\u65e5\uff0c\u53d7\u2018\u70df\u82b1\u2019\u7684\u5f71\u54cd\uff0c\u6d59\u6c5f\u3001\u798f\u5efa\u3001\u4e0a\u6d77\u3001\u6c5f\u82cf\u548c\u53f0\u6e7e\u5730\u533a\u90fd\u4f1a\u4ea7\u751f\u6bd4\u8f83\u660e\u663e\u7684\u98ce\u96e8\u5929\u6c14\u3002\u201d\u9648\u6d9b\u8bf4\u3002\u6c14\u8c61\u90e8\u95e8\u662f\u5426\u53ca\u65f6\u9884\u8b66\uff1f\u6cb3\u5357\u906d\u7279\u5927\u66b4\u96e8\u540e\uff0c\u6709\u5173\u201c\u6c14\u8c61\u90e8\u95e8\u662f\u5426\u53ca\u65f6\u9884\u8b66\u201d\u7684\u95ee\u9898\u5907\u53d7\u5173\u6ce8\u3002\u82cf\u7231\u82b3\u8bf4\uff0c\u6cb3\u5357\u7701\u6c14\u8c61\u5c40\u57287\u670813\u65e5\u5c31\u5173\u6ce8\u5230\u66b4\u96e8\u8fc7\u7a0b\uff0c\u57287\u670816\u65e59\u65f650\u5206\u53d1\u5e03\u4e86\u6cb3\u5357\u7701\u7684\u7b2c\u4e00\u6b21\u66b4\u96e8\u6a59\u8272\u9884\u8b66\u4fe1\u53f7\u3002\u82cf\u7231\u82b3\u79f0\uff0c\u6cb3\u5357\u7701\u6c14\u8c61\u5c407\u670815\u65e5\u62a5\u9001\u7684\u300a\u91cd\u8981\u5929\u6c14\u62a5\u544a\u300b\u6307\u51fa\uff0c\u201c17\u65e5\u523019\u65e5\u6211\u7701\u5317\u90e8\u3001\u4e2d\u4e1c\u90e8\u6709\u66b4\u96e8\u5927\u66b4\u96e8\u3001\u5c40\u90e8\u7279\u5927\u66b4\u96e8\uff0c\u9700\u52a0\u5f3a\u9632\u8303\u201d\uff0c\u4e4b\u540e\u8fd8\u6eda\u52a8\u53d1\u5e03\u300a\u91cd\u8981\u6c14\u8c61\u4fe1\u606f\u300b\u300a\u6c14\u8c61\u4fe1\u606f\u5feb\u62a5\u300b\u7b49\u51b3\u7b56\u670d\u52a1\u6750\u6599\uff0c\u5f00\u5c55\u8054\u5408\u4f1a\u55468\u6b21\uff0c\u5e76\u8054\u5408\u6c34\u5229\u5385\u3001\u81ea\u7136\u8d44\u6e90\u5385\u53d1\u5e03\u5c71\u6d2a\u3001\u5730\u8d28\u707e\u5bb3\u6c14\u8c61\u98ce\u9669\u9884\u8b66\u9884\u62a5\uff0c\u5e76\u5bf9\u7701\u9632\u6c5b\u529e\u3001\u7701\u5e94\u6025\u5385\u3001\u7701\u5730\u8d28\u73af\u5883\u603b\u7ad9\u5f00\u5c55\u4e86\u53eb\u5e94\u670d\u52a1\uff0c\u7701\u5e02\u53bf\u4e09\u7ea7\u6c14\u8c61\u90e8\u95e8\u5747\u7b2c\u4e00\u65f6\u95f4\u5c06\u76f8\u5173\u4fe1\u606f\u9001\u8fbe\u672c\u7ea7\u515a\u653f\u4e3b\u8981\u8d1f\u8d23\u4eba\u3002\u636e\u5979\u4ecb\u7ecd\uff0c\u6b64\u6b21\u66b4\u96e8\uff0c\u6cb3\u5357\u7701\u3001\u5e02\u3001\u53bf\u6c14\u8c61\u90e8\u95e8\u5171\u53d1\u5e03\u9884\u8b66\u4fe1\u606f1184\u6761\uff0c\u90d1\u5dde\u81ea19\u65e5\u591c\u95f4\u8d77\u53d1\u5e03\u66b4\u96e8\u6a59\u8272\u3001\u7ea2\u8272\u9884\u8b66\u4fe1\u53f7\u517111\u6761\uff0c\u77ed\u4fe1\u63a5\u6536\u603b\u4eba\u6b21\u8fbe1.2\u4ebf\uff0c\u5171\u54112.25\u4e07\u540d\u5e94\u6025\u8d23\u4efb\u4eba\u53d1\u9001\u9884\u8b6654\u4e07\u6761\u3002\u82cf\u7231\u82b3\u8fd8\u63d0\u5230\uff0c\u4e2d\u56fd\u6c14\u8c61\u5c407\u670816\u65e5\u66fe\u5411\u76f8\u5173\u90e8\u95e8\u62a5\u9001\u91cd\u5927\u6c14\u8c61\u4fe1\u606f\u4e13\u62a5\uff0c\u6eda\u52a8\u53d1\u5e036\u671f\u51b3\u7b56\u6c14\u8c61\u670d\u52a1\u6750\u6599\u3002\u76ee\u524d\uff0c\u6cb3\u5357\u7701\u5404\u7ea7\u6c14\u8c61\u90e8\u95e8\u5b9e\u65bd24\u5c0f\u65f6\u6218\u65f6\u5de5\u4f5c\u673a\u5236\uff0c\u5c06\u5168\u529b\u505a\u597d\u6b64\u6b21\u5927\u66b4\u96e8\u3001\u7279\u5927\u66b4\u96e8\u5929\u6c14\u8fc7\u7a0b\u7684\u4fdd\u969c\u3002\u9884\u8b66\u4e4b\u4e0b\uff0c\u6d2a\u707e\u4e3a\u4f55\u96be\u4ee5\u907f\u514d\uff1f\u9648\u6d9b\u4ece\u6c14\u8c61\u89d2\u5ea6\u8fdb\u884c\u4e86\u89e3\u91ca\uff1a\u6781\u7aef\u66b4\u96e8\u3001\u6781\u7aef\u9ad8\u6e29\u4ecd\u662f\u5168\u7403\u5171\u540c\u9762\u4e34\u7684\u96be\u9898\uff0c\u8fd9\u79cd\u6781\u7aef\u5929\u6c14\u79d1\u5b66\u673a\u5236\u5f62\u6210\u975e\u5e38\u590d\u6742\uff0c\u518d\u843d\u5b9e\u5230\u6570\u503c\u9884\u62a5\u4e2d\uff0c\u4ecd\u7f3a\u5c11\u6709\u6548\u624b\u6bb5\u8fdb\u4e00\u6b65\u89e3\u51b3\uff0c\u8fd9\u4e5f\u662f\u6c14\u8c61\u90e8\u95e8\u6b63\u7740\u624b\u653b\u514b\u7684\u96be\u5173\u3002\u66b4\u96e8\u8fd8\u8981\u4e0b\u591a\u4e45\uff1f\u9488\u5bf9\u672c\u8f6e\u6781\u7aef\u964d\u96e8\u7684\u8d70\u52bf\uff0c\u82cf\u7231\u82b3\u4ecb\u7ecd\uff0c\u9884\u8ba1\u672a\u67653\u5929\uff0c\u6cb3\u5357\u7701\u4ecd\u6709\u964d\u96e8\uff0c\u5176\u4e2d21\u65e5\u964d\u96e8\u5f3a\u5ea6\u5927\uff0c\u90d1\u5dde\u6709\u66b4\u96e8\u3001\u5c40\u5730\u5927\u66b4\u96e8\u3002\u5177\u4f53\u9884\u62a5\u5982\u4e0b\u2014\u201421\u65e5\uff0c\u6cb3\u5357\u4e2d\u5317\u90e8\u6709\u5927\u5230\u66b4\u96e8\uff0c\u5317\u90e8\u90e8\u5206\u5730\u533a\u6709\u5927\u66b4\u96e8\u3001\u5c40\u5730\u7279\u5927\u66b4\u96e8\uff1b\u90d1\u5dde\u5730\u533a\u6709\u66b4\u96e8\u3001\u5c40\u5730\u5927\u66b4\u96e8\uff0850\uff5e120\u6beb\u7c73\uff09\u300222\u65e5\uff0c\u6cb3\u5357\u4e2d\u897f\u90e8\u6709\u5c0f\u5230\u4e2d\u96e8\uff1b\u90d1\u5dde\u5730\u533a\u6709\u5c0f\u5230\u4e2d\u96e8\uff085\uff5e15\u6beb\u7c73\uff09\u300223\u65e5\uff0c\u6cb3\u5357\u4e2d\u897f\u90e8\u5c0f\u5230\u4e2d\u96e8\uff1b\u90d1\u5dde\u5730\u533a\u6709\u5206\u6563\u6027\u9635\u96e8\uff081\uff5e5\u6beb\u7c73\uff09\u30
